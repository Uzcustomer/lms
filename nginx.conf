user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;

    upstream app_backend {
        server lmsttatf_app:9000;  # Ensure this points to your Laravel app container
        keepalive 16;  # PHP-FPM ga doimiy ulanishlar saqlab turish
    }

    server {
        listen 80 ;
        server_name mark.tashmedunitf.uz;

        client_max_body_size 300M;
        client_body_buffer_size 2m;

        root /var/www/html/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass app_backend;  # Use upstream defined above
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            # Timeout sozlamalari — ulanish uzilishini oldini olish
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 300s;
            fastcgi_read_timeout 300s;
            fastcgi_buffering on;
            fastcgi_buffer_size 64k;
            fastcgi_buffers 32 32k;
            fastcgi_busy_buffers_size 128k;
            fastcgi_temp_file_write_size 256k;

            # Debug headerlar — brauzer Network tabida ko'rinadi
            add_header X-Debug-Upstream "app_backend" always;
            add_header X-Debug-Request-Time $request_time always;
        }

        location ~ /\.ht {
            deny all;
        }

        # Block direct access to debug/admin tools that must never be web-accessible
        location ~* ^/(MyAdmin|phpmyadmin|pma|adminer)(/|$) {
            deny all;
            return 404;
        }

        # Block standalone PHP debug scripts in public root
        location ~* ^/(check_db|_dbg_cols|rest_student_grades.*|rest_health|sql-optimal)\.php$ {
            deny all;
            return 404;
        }

        # Block .env and other sensitive dot-files
        location ~ /\.(env|git|svn|htpasswd) {
            deny all;
            return 404;
        }

        # Remove server version from error pages
        server_tokens off;
    }
}
