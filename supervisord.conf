[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
stdout_logfile=/var/log/php-fpm.log
stderr_logfile=/var/log/php-fpm_error.log

[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true
stdout_logfile=/var/log/cron.log
stderr_logfile=/var/log/cron_error.log
user=root
stopwaitsecs=3600
stopsignal=QUIT
killasgroup=true
stopasgroup=true
priority=1
startretries=3

[program:laravel-queue]
command=php /var/www/html/artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --backoff=30
autostart=true
autorestart=true
numprocs=1
user=root
stdout_logfile=/var/log/laravel-queue.log
stderr_logfile=/var/log/laravel-queue_error.log
stopwaitsecs=3600
stopsignal=QUIT
killasgroup=true
stopasgroup=true
priority=2
startretries=3
